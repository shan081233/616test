<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0616test</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    max-width: 300px;
}

h1 {
    color: #ff4d6d;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #4a90e2;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #357ab8;
}

#msg {
    margin-top: 15px;
    display: none;
    color: #333;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎁 今天是個美好的一天</h1>
    <p>點下面按鈕看看驚喜</p>
    
    <button onclick="showMessage()">點我</button>
    
    <div id="msg">💖 你今天會很順利💖！</div>
</div>

<script>
function showMessage() {
    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
